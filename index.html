<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern SaaS Landing Page</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: Arial, sans-serif;
}

body {
height: 100vh;
background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
color: white;
overflow-x: hidden;
}

/* NAVBAR VIA GRID FOR PERFECT CENTERING */
nav {
display: grid;
grid-template-columns: 1fr auto 1fr; /* 3 equal structural columns */
align-items: center;
padding: 15px 60px;
position: fixed;
width: 100%;
top: 0;
backdrop-filter: blur(10px);
background: rgba(255,255,255,0.05);
border-bottom: 1px solid rgba(255,255,255,0.1);
z-index: 1000;
}

/* Left Column */
nav h2 {
font-size: 22px;
letter-spacing: 1px;
white-space: nowrap;
justify-self: start; /* Pushes brand text to the far left */
}

/* Middle Column (Logo Box) */
.logo-box {
justify-self: center; /* Locks the logo exactly in the center */
display: flex;
align-items: center;
justify-content: center;
}

.logo-img {
height: auto; /* Adjust height to fit your design */
width: auto;
object-fit: contain;
}

/* Right Column */
nav ul {
display: flex;
gap: 25px;
list-style: none;
justify-self: end; /* Pushes links to the far right */
}

nav ul li {
cursor: pointer;
opacity: 0.8;
transition: 0.3s;
}

nav ul li:hover {
opacity: 1;
}

/* HERO SECTION */
.hero {
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 0 20px;
}

.hero-box {
max-width: 800px;
padding: 40px;
background: rgba(255,255,255,0.08);
border-radius: 20px;
backdrop-filter: blur(15px);
box-shadow: 0 10px 40px rgba(0,0,0,0.4);
border: 1px solid rgba(255,255,255,0.15);
}

.hero h1 {
font-size: 48px;
margin-bottom: 20px;
}

.hero p {
font-size: 18px;
opacity: 0.8;
margin-bottom: 30px;
}

.btn {
display: inline-block;
padding: 12px 30px;
background: #4f46e5;
color: white;
border-radius: 10px;
text-decoration: none;
font-weight: bold;
transition: 0.3s;
}

.btn:hover {
background: #6366f1;
transform: scale(1.05);
}

/* RESPONSIVE DESIGN */
@media(max-width: 768px){
nav {
padding: 15px 20px;
grid-template-columns: 1fr; /* Stack layout on mobile phones */
gap: 10px;
text-align: center;
}

nav h2, .logo-box, nav ul {
justify-self: center; /* Center align everything vertically on mobile */
}

nav ul {
padding-top: 5px;
}

.hero h1 {
font-size: 32px;
}

.hero-box {
padding: 25px;
}
}
</style>

</head>

<body>

<nav>
<h2>Liz Fashion Industry</h2>

<div class="logo-box">
<img src="https://drive.google.com/file/d/1Jn7GTAbuCzCr52tz2EXRiA-gESe5G3SL/view?usp=drive_link" alt="Logo" class="logo-img">
</div>

<ul>
<li>Home</li>
<li>Policies</li>
<li>JD</li>
</ul>
</nav>

<section class="hero">
<div class="hero-box">

<h1>Welcome To The Performance Team Website</h1>
<p>In this Website you will get all the Policies, JD</p>
<a href="#" class="btn">Get Started</a>

</div>
</section>

</body>
</html>
