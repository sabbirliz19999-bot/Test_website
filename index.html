<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern SaaS Landing Page</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: Arial, sans-serif;
}

body {
height: 100vh;
background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
color: white;
overflow-x: hidden;
}

/* NAVBAR */
nav {
display: flex;
justify-content: space-between;
align-items: center;
padding: 20px 60px;
position: fixed;
width: 100%;
top: 0;
backdrop-filter: blur(10px);
background: rgba(255,255,255,0.05);
border-bottom: 1px solid rgba(255,255,255,0.1);
z-index: 1000; /* Keeps navbar on top of content */
}

/* LOGO GROUPING */
.logo-container {
display: flex;
align-items: center;
gap: 15px; /* Space between logo and text */
}

.logo-img {
height: 40px; /* Adjust height to match your logo's proportions */
width: auto;
object-fit: contain;
}

nav h2 {
font-size: 22px;
letter-spacing: 1px;
white-space: nowrap; /* Prevents text from breaking into two lines */
}

nav ul {
display: flex;
gap: 25px;
list-style: none;
align-items: center;
}

nav ul li {
cursor: pointer;
opacity: 0.8;
transition: 0.3s;
}

nav ul li:hover {
opacity: 1;
}

/* HERO SECTION */
.hero {
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
padding: 0 20px;
}

.hero-box {
max-width: 800px;
padding: 40px;
background: rgba(255,255,255,0.08);
border-radius: 20px;
backdrop-filter: blur(15px);
box-shadow: 0 10px 40px rgba(0,0,0,0.4);
border: 1px solid rgba(255,255,255,0.15);
}

.hero h1 {
font-size: 48px;
margin-bottom: 20px;
}

.hero p {
font-size: 18px;
opacity: 0.8;
margin-bottom: 30px;
}

.btn {
display: inline-block;
padding: 12px 30px;
background: #4f46e5;
color: white;
border-radius: 10px;
text-decoration: none;
font-weight: bold;
transition: 0.3s;
}

.btn:hover {
background: #6366f1;
transform: scale(1.05);
}

/* RESPONSIVE */
@media(max-width:768px){
nav {
padding: 15px 20px;
}

nav h2 {
font-size: 18px; /* Shrinks text slightly on mobile */
}

.logo-img {
height: 32px; /* Shrinks logo slightly on mobile */
}

.hero h1 {
font-size: 32px;
}

.hero-box {
padding: 25px;
}
}
</style>

</head>

<body>

<nav>
<div class="logo-container">
<img src="https://drive.google.com/file/d/1U5vGwiDXMBQkw8kFTJttb2SlE50sYDVR/view?usp=drive_link" class="logo-img">
<h2>Liz Fashion Industry</h2>
</div>
<ul>
<li>Home</li>
<li>Policies</li>
<li>JD</li>
</ul>
</nav>

<section class="hero">
<div class="hero-box">

<h1>Welcome To The Performance Team Website</h1>
<p>In this Website you will get all the Policies, JD</p>
<a href="#" class="btn">Get Started</a>

</div>
</section>

</body>
</html>
